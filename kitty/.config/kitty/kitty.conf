background_opacity 0.55
background_blur 90


# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS


font_size 12.5
adjust_line_height 2

scrollback_lines 100000


# BEGIN_KITTY_THEME
# GitHub Dark
include current-theme.conf
# END_KITTY_THEME


copy_on_select yes
