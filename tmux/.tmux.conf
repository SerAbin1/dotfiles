set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-s

set -g mouse on
setw -g mode-keys vi
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"

# so that nvim can seee events like FocusLost
set -g focus-events on

# Split panes with Prefix + h (horizontal) and Prefix + v (vertical)
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# new window on same directory
bind c new-window -c "#{pane_current_path}"

set-option -g status-position top

# set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.0'

set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application} #{E:@catppuccin_status_session}"

set -g status-style bg=default

# Set current command as window text
set -g @catppuccin_window_text " #{pane_current_command}"
# the below is the default, change it if you want
# #T refers to the name set by the terminal
# @catppuccin_window_current_text " #T"

# Move to previous/next window
bind , previous-window
bind . next-window

# Remap the overwritten defaults to < and >
bind < command-prompt -I "#W" "rename-window '%%'"
bind > command-prompt "move-window -t '%%'"

# Prefix + n -> create a new session
bind n command-prompt -p "Session name:" "new-session -s '%%' -c '#{pane_current_path}'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
